name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: rmnqfrljoknmellbnpiy
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          # Pinned (HK May 21 2026): version 'latest' calls GitHub's
          # release API which is rate-limited on shared runners. Every
          # push to main was failing with 'rate limit exceeded' and
          # sending Run failed emails. Pinning to a specific version
          # skips the API lookup entirely. Bump this manually when we
          # want a newer CLI; the deploy itself is the same regardless.
          version: 2.100.1
      - name: Deploy all edge functions
        run: |
          # Functions that skip gateway JWT verification (auth handled inside)
          # square-oauth-callback: Square redirects here after OAuth consent.
          #   The redirect carries no auth header. The function authenticates
          #   the request via the OAuth code + state (state = therapist_id).
          NO_JWT_FUNCTIONS="send-push signup-guard founder-outreach unsubscribe resend-backfill preview-emails run-migration square-oauth-callback google-calendar-callback notify-agreement-signed stripe-payment-link-webhook stripe-refund-webhook sms-inbound twilio-status-callback"
          FAILED_FUNCTIONS=""
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            if [ -f "$dir/index.ts" ]; then
              if echo " $NO_JWT_FUNCTIONS " | grep -q " $fn "; then
                echo "Deploying $fn (no-verify-jwt)..."
                if ! supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt; then
                  echo "::error::Deploy failed for $fn"
                  FAILED_FUNCTIONS="$FAILED_FUNCTIONS $fn"
                fi
              else
                echo "Deploying $fn..."
                if ! supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF"; then
                  echo "::error::Deploy failed for $fn"
                  FAILED_FUNCTIONS="$FAILED_FUNCTIONS $fn"
                fi
              fi
            fi
          done
          if [ -n "$FAILED_FUNCTIONS" ]; then
            echo "::error::The following functions failed to deploy:$FAILED_FUNCTIONS"
            exit 1
          fi
          echo "All edge functions deployed successfully"
