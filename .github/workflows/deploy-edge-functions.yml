name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - '.github/workflows/deploy-edge-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: rmnqfrljoknmellbnpiy
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Deploy all edge functions
        run: |
          # Functions that skip gateway JWT verification (auth handled inside)
          NO_JWT_FUNCTIONS="send-push signup-guard founder-outreach"
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            if [ -f "$dir/index.ts" ]; then
              if echo " $NO_JWT_FUNCTIONS " | grep -q " $fn "; then
                echo "Deploying $fn (no-verify-jwt)..."
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" --no-verify-jwt || echo "WARN: $fn failed, continuing"
              else
                echo "Deploying $fn..."
                supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_REF" || echo "WARN: $fn failed, continuing"
              fi
            fi
          done
