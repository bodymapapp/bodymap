<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 1200px; height: 630px;
    background: #F9F5EE;
    font-family: 'Inter', system-ui, sans-serif;
    overflow: hidden;
  }

  .card {
    width: 1200px; height: 630px;
    background:
      radial-gradient(circle at 95% 5%, rgba(201,168,76,0.06) 0%, transparent 35%),
      linear-gradient(135deg, #F9F5EE 0%, #F3EDD9 100%);
    display: flex;
    align-items: center;
    padding: 60px 70px;
    position: relative;
  }

  /* Soft botanical accent in bottom-left */
  .leaf-bg {
    position: absolute; bottom: -40px; left: -30px;
    width: 200px; height: 200px;
    opacity: 0.07;
  }

  /* LEFT side */
  .left {
    flex: 1;
    max-width: 640px;
    padding-right: 30px;
    position: relative;
    z-index: 2;
  }

  .brand {
    display: inline-flex; align-items: center; gap: 9px;
    background: rgba(28,43,34,0.06);
    padding: 7px 14px;
    border-radius: 999px;
    margin-bottom: 24px;
  }
  .brand-leaf { width: 18px; height: 18px; }
  .brand-name {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 17px; font-weight: 600;
    color: #1C2B22; letter-spacing: -0.2px;
  }

  h1 {
    font-family: 'Fraunces', Georgia, serif;
    font-weight: 500;
    font-size: 64px;
    line-height: 1.04;
    color: #1C2B22;
    letter-spacing: -1.5px;
    margin-bottom: 22px;
  }
  h1 .accent {
    font-style: italic;
    color: #4A6B54;
    font-weight: 500;
  }

  .subhead {
    font-size: 20px;
    line-height: 1.5;
    color: #3D4F43;
    font-weight: 400;
    margin-bottom: 34px;
    max-width: 540px;
  }
  .subhead strong { color: #1C2B22; font-weight: 600; }

  .footer-row {
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .url {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px;
    font-weight: 600;
    color: #1C2B22;
    letter-spacing: -0.3px;
  }
  .url-divider {
    width: 4px; height: 4px; border-radius: 50%;
    background: #9CA3AF;
  }
  .badge {
    background: #EEF3EE;
    color: #2D4A35;
    font-size: 13px; font-weight: 700;
    padding: 6px 12px;
    border-radius: 999px;
    letter-spacing: 0.2px;
    border: 1px solid #C5D6CC;
  }

  /* RIGHT side: body visualization */
  .right {
    width: 460px;
    height: 510px;
    flex-shrink: 0;
    position: relative;
    z-index: 1;
  }
  .body-wrap {
    background: #FFFFFF;
    border: 1px solid #E8E0D0;
    border-radius: 22px;
    padding: 20px 18px 16px;
    height: 100%;
    box-shadow:
      0 1px 2px rgba(28,43,34,0.04),
      0 16px 36px rgba(28,43,34,0.08);
    display: flex; flex-direction: column;
  }
  .body-caption {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .body-caption-left {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px; font-weight: 700;
    color: #92660E;
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }
  .visits-pill {
    background: #FAF3DC;
    color: #92660E;
    font-size: 10px; font-weight: 700;
    padding: 3px 9px;
    border-radius: 999px;
    letter-spacing: 0.6px;
    border: 1px solid #E5D085;
  }

  .body-row {
    display: flex; justify-content: space-around; gap: 8px;
    flex: 1;
  }
  .body-col { display: flex; flex-direction: column; align-items: center; flex: 1; }
  .body-label {
    font-family: 'Inter', sans-serif;
    font-size: 10.5px; font-weight: 700;
    color: #6B7F72;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }
  .body-svg { flex: 1; }

  .body-stats {
    display: flex; justify-content: space-around;
    padding-top: 12px;
    border-top: 1px solid #F0EAD8;
    margin-top: 4px;
  }
  .stat {
    text-align: center;
    flex: 1;
  }
  .stat-num {
    font-family: 'Fraunces', Georgia, serif;
    font-size: 20px; font-weight: 600;
    color: #1C2B22;
    line-height: 1;
  }
  .stat-label {
    font-family: 'Inter', sans-serif;
    font-size: 9.5px; font-weight: 600;
    color: #6B7F72;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    margin-top: 4px;
  }
</style>
</head>
<body>
  <div class="card">

    <!-- Subtle botanical accent -->
    <svg class="leaf-bg" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <path d="M50 5 Q30 25 25 50 Q25 75 50 95 Q75 75 75 50 Q70 25 50 5 Z" fill="#4A6B54"/>
      <path d="M50 5 L50 95" stroke="#1C2B22" stroke-width="1.5" opacity="0.5"/>
    </svg>

    <!-- LEFT: typography -->
    <div class="left">
      <div class="brand">
        <svg class="brand-leaf" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2 Q6 6 5 13 Q5 19 12 22 Q19 19 19 13 Q18 6 12 2 Z" fill="#4A6B54"/>
          <path d="M12 2 L12 22" stroke="#1C2B22" stroke-width="1.3" opacity="0.6"/>
        </svg>
        <div class="brand-name">MyBodyMap</div>
      </div>

      <h1>Retain &amp; grow<br>your <span class="accent">client base.</span></h1>

      <div class="subhead">
        Client intelligence and follow-ups on autopilot.<br>
        <strong>Built for solo massage therapists.</strong>
      </div>

      <div class="footer-row">
        <div class="url">mybodymap.app</div>
        <div class="url-divider"></div>
        <div class="badge">Free Silver for founding therapists</div>
      </div>
    </div>

    <!-- RIGHT: real product visualization -->
    <div class="right">
      <div class="body-wrap">
        <div class="body-caption">
          <div class="body-caption-left">Tension pattern · Sarah</div>
          <div class="visits-pill">5 VISITS</div>
        </div>
        <div class="body-row">
          <!-- FRONT figure -->
          <div class="body-col">
            <div class="body-label">FRONT</div>
            <svg class="body-svg" viewBox="0 0 170 320" xmlns="http://www.w3.org/2000/svg">
              <!-- Head -->
              <circle cx="85" cy="32" r="22" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <!-- Torso -->
              <path d="M57 64 Q47 70 44 90 L40 155 Q40 162 48 162 L122 162 Q130 162 130 155 L126 90 Q123 70 113 64 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <!-- Left arm -->
              <path d="M57 66 Q42 74 38 115 Q36 128 40 138 Q46 141 50 138 Q54 112 60 85 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <!-- Right arm -->
              <path d="M113 66 Q128 74 132 115 Q134 128 130 138 Q124 141 120 138 Q116 112 110 85 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <!-- Left leg -->
              <path d="M60 162 Q56 195 54 232 Q52 260 56 278 Q62 284 70 282 Q76 278 76 260 L78 162 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <!-- Right leg -->
              <path d="M110 162 Q114 195 116 232 Q118 260 114 278 Q108 284 100 282 Q94 278 94 260 L92 162 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>

              <!-- Heatmap dots: R shoulder (front), L hip, R hip, lower-back-front -->
              <!-- R shoulder: 4 visits = strong sage -->
              <circle cx="115" cy="75" r="20" fill="rgba(74,107,84,0.18)"/>
              <circle cx="115" cy="75" r="15" fill="#4A6B54" stroke="#2D4A35" stroke-width="2.5"/>
              <text x="115" y="80" text-anchor="middle" font-family="Fraunces, serif" font-size="14" font-weight="700" fill="white">4</text>

              <!-- L hip: 3 visits -->
              <circle cx="70" cy="160" r="17" fill="rgba(74,107,84,0.15)"/>
              <circle cx="70" cy="160" r="12" fill="#4A6B54" stroke="#2D4A35" stroke-width="2"/>
              <text x="70" y="164" text-anchor="middle" font-family="Fraunces, serif" font-size="12" font-weight="700" fill="white">3</text>

              <!-- R hip: 2 visits -->
              <circle cx="100" cy="160" r="15" fill="rgba(74,107,84,0.12)"/>
              <circle cx="100" cy="160" r="10" fill="#4A6B54" stroke="#2D4A35" stroke-width="2"/>
              <text x="100" y="164" text-anchor="middle" font-family="Fraunces, serif" font-size="11" font-weight="700" fill="white">2</text>

              <!-- Avoid: neck (red) -->
              <circle cx="85" cy="60" r="14" fill="rgba(185,28,28,0.14)"/>
              <circle cx="85" cy="60" r="9" fill="#B91C1C" stroke="#7F1D1D" stroke-width="2"/>
              <text x="85" y="63" text-anchor="middle" font-family="Fraunces, serif" font-size="11" font-weight="700" fill="white">1</text>
            </svg>
          </div>

          <!-- BACK figure -->
          <div class="body-col">
            <div class="body-label">BACK</div>
            <svg class="body-svg" viewBox="0 0 170 320" xmlns="http://www.w3.org/2000/svg">
              <!-- Head -->
              <circle cx="85" cy="32" r="22" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <!-- Torso -->
              <path d="M57 64 Q47 70 44 90 L40 155 Q40 162 48 162 L122 162 Q130 162 130 155 L126 90 Q123 70 113 64 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <path d="M57 66 Q42 74 38 115 Q36 128 40 138 Q46 141 50 138 Q54 112 60 85 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <path d="M113 66 Q128 74 132 115 Q134 128 130 138 Q124 141 120 138 Q116 112 110 85 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <path d="M60 162 Q56 195 54 232 Q52 260 56 278 Q62 284 70 282 Q76 278 76 260 L78 162 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>
              <path d="M110 162 Q114 195 116 232 Q118 260 114 278 Q108 284 100 282 Q94 278 94 260 L92 162 Z" fill="#F5EFE0" stroke="#C5BCA0" stroke-width="1.5"/>

              <!-- Heatmap dots: Mid back high, R QL strong, R shoulder blade -->
              <!-- Mid back: 5 visits = STRONGEST -->
              <circle cx="85" cy="115" r="22" fill="rgba(74,107,84,0.22)"/>
              <circle cx="85" cy="115" r="17" fill="#4A6B54" stroke="#2D4A35" stroke-width="2.5"/>
              <text x="85" y="120" text-anchor="middle" font-family="Fraunces, serif" font-size="16" font-weight="700" fill="white">5</text>

              <!-- R QL: 4 visits -->
              <circle cx="110" cy="148" r="18" fill="rgba(74,107,84,0.18)"/>
              <circle cx="110" cy="148" r="13" fill="#4A6B54" stroke="#2D4A35" stroke-width="2"/>
              <text x="110" y="153" text-anchor="middle" font-family="Fraunces, serif" font-size="13" font-weight="700" fill="white">4</text>

              <!-- R shoulder blade: 3 visits -->
              <circle cx="105" cy="80" r="17" fill="rgba(74,107,84,0.15)"/>
              <circle cx="105" cy="80" r="12" fill="#4A6B54" stroke="#2D4A35" stroke-width="2"/>
              <text x="105" y="84" text-anchor="middle" font-family="Fraunces, serif" font-size="12" font-weight="700" fill="white">3</text>

              <!-- L glute: 2 visits -->
              <circle cx="70" cy="175" r="14" fill="rgba(74,107,84,0.13)"/>
              <circle cx="70" cy="175" r="10" fill="#4A6B54" stroke="#2D4A35" stroke-width="2"/>
              <text x="70" y="179" text-anchor="middle" font-family="Fraunces, serif" font-size="11" font-weight="700" fill="white">2</text>
            </svg>
          </div>
        </div>

        <div class="body-stats">
          <div class="stat">
            <div class="stat-num">5</div>
            <div class="stat-label">Visits</div>
          </div>
          <div class="stat">
            <div class="stat-num">12wk</div>
            <div class="stat-label">Span</div>
          </div>
          <div class="stat">
            <div class="stat-num">↓40%</div>
            <div class="stat-label">Pain</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</body>
</html>
