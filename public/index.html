    <script>
      // Splash removal — triggers on multiple paths to prevent getting stuck.
      // Old version relied on window.load (which can hang indefinitely if
      // any resource fails to load, e.g. blocked PostHog). New version uses
      // DOMContentLoaded + a shorter delay + fallback timeouts.
      (function() {
        function removeSplash() {
          const splash = document.getElementById('pwa-splash');
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(() => { try { splash.remove(); } catch (e) {} }, 350);
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          setTimeout(removeSplash, 600);
        } else {
          document.addEventListener('DOMContentLoaded', () => setTimeout(removeSplash, 600));
        }
        // Absolute failsafe — splash MUST be gone after 3s no matter what.
        setTimeout(removeSplash, 3000);
      })();

      // Register service worker. If a broken older SW is present, force unregister first.
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            // Self-heal: if any registration is from the broken v1/v2 SW,
            // unregister it entirely and wipe old caches. New SW will install
            // fresh on the next page view. This fixes users who had the bad
            // SW cached without them needing to do anything.
            let hadOldCache = false;
            try {
              const cacheKeys = await caches.keys();
              hadOldCache = cacheKeys.some(k => k === 'bodymap-v1' || k === 'bodymap-v2');
              if (hadOldCache) {
                await Promise.all(cacheKeys.map(k => caches.delete(k)));
              }
            } catch (e) {}
            if (hadOldCache && regs.length) {
              await Promise.all(regs.map(r => r.unregister().catch(() => {})));
              // After unregister, register fresh v3 SW.
              navigator.serviceWorker.register('/sw.js').catch(() => {});
              return;
            }
            // Normal path: update existing registrations so new SW takes over.
            await Promise.all(regs.map(r => r.update().catch(() => {})));
            if (!regs.length) {
              navigator.serviceWorker.register('/sw.js').catch(() => {});
            }
          } catch (e) {}
        });
      }
    </script>
