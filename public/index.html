    <style>
      /* PWA splash screen. Warm cream background matches the new site
         theme so the transition from splash to loaded site is seamless. */
      #pwa-splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #F9F5EE;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        transition: opacity 0.4s ease;
      }
      #pwa-splash.hidden { opacity: 0; pointer-events: none; }
      #pwa-splash svg { animation: pulse 2.4s ease-in-out infinite; }
      @keyframes pulse { 0%,100% { transform: scale(1); opacity:1; } 50% { transform: scale(1.04); opacity:0.9; } }

      /* Safe area for notched phones (mobile only — desktop gets 0) */
      body {
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
      }

      /* Prevent overscroll bounce (iOS). Do NOT use -webkit-overflow-scrolling
         on html/body — it's deprecated, has been removed from spec, and
         causes freeze bugs in Chrome on some content heights. */
      html, body { overscroll-behavior: none; }

      /* Remove tap highlight on mobile */
      * { -webkit-tap-highlight-color: transparent; }

      /* Bottom nav safe area */
      .bm-bottom-nav { padding-bottom: env(safe-area-inset-bottom); }
    </style>

  <body>
    <!-- PWA Splash Screen -->
    <div id="pwa-splash">
      <svg width="64" height="80" viewBox="0 0 60 72" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M30 4 C20 4 10 12 10 24 C10 32 14 38 20 42 L20 58 C20 61 22 63 25 63 L35 63 C38 63 40 61 40 58 L40 42 C46 38 50 32 50 24 C50 12 40 4 30 4Z" fill="#4A7A5C" opacity="0.3"/>
        <path d="M22 8 C14 10 8 18 10 28 C11 35 16 40 22 43 L22 58 C22 60 24 62 26 62 L28 62 L28 8Z" fill="#6B9E80" opacity="0.6"/>
        <path d="M30 2 C38 2 46 8 48 18 C50 28 44 38 36 42 L36 60 C36 62 34 64 32 64 L28 64 C26 64 24 62 24 60 L24 42 C16 38 10 28 12 18 C14 8 22 2 30 2Z" fill="#2A5741"/>
        <ellipse cx="30" cy="18" rx="6" ry="8" fill="#A8C5B5" opacity="0.4"/>
      </svg>
      <div style="color:#1C2B22;font-family:'Fraunces',Georgia,serif;font-size:26px;font-weight:500;margin-top:20px;letter-spacing:-0.02em;">MyBodyMap</div>
      <div style="color:#6B7F72;font-family:'Inter',system-ui,sans-serif;font-size:11px;font-weight:600;letter-spacing:0.22em;text-transform:uppercase;margin-top:8px;">For massage therapists</div>
    </div>

    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

    <script>
      // Splash removal — triggers on multiple paths to prevent getting stuck.
      // Old version relied on window.load (which can hang indefinitely if
      // any resource fails to load, e.g. blocked PostHog). New version uses
      // DOMContentLoaded + a shorter delay + fallback timeouts.
      (function() {
        function removeSplash() {
          const splash = document.getElementById('pwa-splash');
          if (!splash) return;
          splash.classList.add('hidden');
          setTimeout(() => { try { splash.remove(); } catch (e) {} }, 350);
        }
        if (document.readyState === 'complete' || document.readyState === 'interactive') {
          setTimeout(removeSplash, 600);
        } else {
          document.addEventListener('DOMContentLoaded', () => setTimeout(removeSplash, 600));
        }
        // Absolute failsafe — splash MUST be gone after 3s no matter what.
        setTimeout(removeSplash, 3000);
      })();

      // Register service worker. If a broken older SW is present, force unregister first.
      if ('serviceWorker' in navigator) {
        // HK Jun 1 2026 v35: SW now posts SW_UPDATE_READY (not the old
        // SW_FORCE_RELOAD). We show a sage-green non-blocking banner at
        // the top of the screen. User taps Refresh, we reload. This
        // avoids the disruption of force-reloading users mid-flow.
        // We still listen for the legacy SW_FORCE_RELOAD so users
        // briefly running the v34 SW don't get stuck if their next
        // session lands on v35's page-side listener.
        function __showUpdateBanner() {
          if (document.getElementById('mbm-update-banner')) return;
          const bar = document.createElement('div');
          bar.id = 'mbm-update-banner';
          bar.style.cssText = [
            'position:fixed', 'top:0', 'left:0', 'right:0', 'z-index:99999',
            'background:#E6F0E9', 'color:#1F3A2A',
            'border-bottom:1.5px solid #B5D4BE',
            'padding:12px 16px', 'font-family:Georgia,serif',
            'font-size:14px', 'font-weight:600',
            'display:flex', 'align-items:center', 'justify-content:center', 'gap:14px',
            'box-shadow:0 2px 12px rgba(0,0,0,0.08)',
          ].join(';');
          bar.innerHTML = ''
            + '<span>🌿 A new version of MyBodyMap is ready.</span>'
            + '<button id="mbm-update-refresh" style="background:#2A5741;color:#fff;border:none;padding:8px 18px;border-radius:8px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;min-height:40px">Refresh</button>'
            + '<button id="mbm-update-dismiss" style="background:transparent;color:#5C7A66;border:none;padding:6px 8px;font-size:13px;cursor:pointer;font-family:inherit">Later</button>';
          document.body.appendChild(bar);
          document.getElementById('mbm-update-refresh').onclick = () => {
            window.location.reload();
          };
          document.getElementById('mbm-update-dismiss').onclick = () => {
            bar.remove();
          };
        }
        try {
          navigator.serviceWorker.addEventListener('message', (event) => {
            const t = event && event.data && event.data.type;
            if (t === 'SW_UPDATE_READY' || t === 'SW_FORCE_RELOAD') {
              __showUpdateBanner();
            }
          });
        } catch (e) {}

        // HK Jun 2 2026: iOS PWAs do NOT fire `load` when resumed from the
        // background, so the update check below never ran and the app kept
        // serving the old bundle until a full cold launch. Re-check for a new
        // service worker whenever the app becomes visible again. This only
        // calls registration.update(); if a new SW activates it posts
        // SW_UPDATE_READY and the banner above lets the user refresh. No
        // auto-reload, so an in-progress edit is never interrupted.
        let __mbmLastUpdateCheck = 0;
        document.addEventListener('visibilitychange', async () => {
          if (document.visibilityState !== 'visible') return;
          const now = Date.now();
          if (now - __mbmLastUpdateCheck < 30000) return; // throttle
          __mbmLastUpdateCheck = now;
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map(r => r.update().catch(() => {})));
          } catch (e) {}
        });

        window.addEventListener('load', async () => {
          try {
            const regs = await navigator.serviceWorker.getRegistrations();
            // Self-heal: if any registration is from the broken v1/v2 SW,
            // unregister it entirely and wipe old caches. New SW will install
            // fresh on the next page view. This fixes users who had the bad
            // SW cached without them needing to do anything.
            let hadOldCache = false;
            try {
              const cacheKeys = await caches.keys();
              hadOldCache = cacheKeys.some(k => k === 'bodymap-v1' || k === 'bodymap-v2');
              if (hadOldCache) {
                await Promise.all(cacheKeys.map(k => caches.delete(k)));
              }
            } catch (e) {}
            if (hadOldCache && regs.length) {
              await Promise.all(regs.map(r => r.unregister().catch(() => {})));
              // After unregister, register fresh v3 SW.
              navigator.serviceWorker.register('/sw.js').catch(() => {});
              return;
            }
            // Normal path: update existing registrations so new SW takes over.
            await Promise.all(regs.map(r => r.update().catch(() => {})));
            if (!regs.length) {
              navigator.serviceWorker.register('/sw.js').catch(() => {});
            }
          } catch (e) {}
        });
      }
    </script>
